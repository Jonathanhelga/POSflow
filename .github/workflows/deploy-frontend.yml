name: Deploy frontend to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'styles/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'firebase.json'
      - '.env.production'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'styles/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'firebase.json'
      - '.env.production'

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

          run: npm ci

      - name: Build production bundle
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting (production)
        if: github.event_name == 'push'
        run: firebase deploy --only hosting --project ${{ vars.GCP_PROJECT_ID }} --non-interactive

      - name: Deploy preview channel (PR)
        if: github.event_name == 'pull_request'
        id: preview
        run: |
          OUTPUT=$(firebase hosting:channel:deploy "pr-${{ github.event.number }}" \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --expires 7d \
            --non-interactive \
            --json)
          URL=$(echo "$OUTPUT" | jq -r '.result["${{ vars.GCP_PROJECT_ID }}"].url')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.number }}
          body: |
            Preview deploy ready: ${{ steps.preview.outputs.url }}
            (channel `pr-${{ github.event.number }}`, expires in 7 days)
